name: "Terraform Teardown"

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'To prevent accidents, type "DESTROY" to confirm'
        required: true
        type: string

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">=1.10.5"
          terraform_wrapper: false # This is likely the missing link
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession

      - name: Terraform Init
        run: terraform init
      - name: Remove OIDC and Role from Terraform State
        run: |
          terraform state rm aws_iam_openid_connect_provider.github
          terraform state rm aws_iam_role.github_role
          terraform state rm aws_iam_role_policy_attachment.github_policy_attach || true
        continue-on-error: true
        
      - name: Verify Teardown Plan (Circuit Breaker)
        if: github.event.inputs.confirmation == 'DESTROY'
        run: |
          # Generate the plan and save it to a temporary file
          terraform plan -destroy -out=destroy.tfplan
          
          # Convert the binary plan to readable text
          terraform show -no-color destroy.tfplan > plan.txt
          
          # SEARCH: If the OIDC role appears in the "to be destroyed" list, FAIL THE JOB.
          if grep -q "aws_iam_role.github_role" plan.txt; then
            echo "::error::SAFETY ALERT: The OIDC Role is still in the destroy plan! Stopping to prevent lockout."
            exit 1
          else
            echo "Safety check passed: OIDC Role is not in the plan."
          fi

      - name: Conditional Destroy
        # This will ONLY run if the step above exited with 0 (success)
        if: github.event.inputs.confirmation == 'DESTROY'
        run: terraform destroy -auto-approve -lock-timeout=3m